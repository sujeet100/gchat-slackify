name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Syntax check
        run: npm run check
      - name: Lint
        run: npm run lint
      - name: Type-check (// @ts-check, no build)
        run: npm run typecheck
      - name: Validate extension contract (permissions / scope / no network)
        run: npm run validate
      - name: Tests (performance contract)
        run: npm test
